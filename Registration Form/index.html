<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>

    <!-- css link -->
    <link rel="stylesheet" href="style.css">

    <!-- bootstrap link -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

</head>
<body>
    
    <div class="container">
    <form>
        <h2>Registration Form</h2>

        <div class="form-group">
        <label>First Name:</label>
        <input type="text" id="fname" placeholder=" Enter your first name">
        <span class="errors" id="fnameErr"></span>
        </div>
        <!-- <br> -->

        <div class="form-group">
        <label>Last Name:</label>
        <input type="text" id="lname" placeholder=" Enter your last name">
        <span class="errors" id="lnameErr"></span>
        </div>
        <!-- <br> -->

        <div class="form-group">
        <label>Email:</label>
        <input type="email" id="email">
        <span class="errors" id="emailErr"></span>
        </div>
        <!-- <br> -->

        <div class="form-group">
        <label>Password:</label>
        <input type="password" id="password">
        <span class="errors" id="passErr"></span>
        </div>

        <div class="form-group">
        <label>Gender:</label>
        <div class="radio-group">
        <input type="radio" name="gender" value="male">Male
        <input type="radio" name="gender" value="female">Female
        </div>
        <span class="errors" id="genderErr"></span>
        </div>

        <div class="form-group">
        <label>Mobile Number:</label>
        <input type="number" id="mobile" name="phone">
        <span class="errors" id="mobileErr"></span>
        </div>

        <button type="submit">Register</button>
    </form>
    </div>

    <script src="final-form.js"></script>
</body>
</html>
