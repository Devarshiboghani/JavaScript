<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Age Calculator</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Segoe UI', sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family: 'Segoe UI', sans-serif;
    background:
    radial-gradient(circle at 0% 20%, rgba(168,85,247,0.6), transparent 40%),
    radial-gradient(circle at 100% 80%, rgba(6,182,212,0.6), transparent 40%),
    #0f172a;
    color:white;
}

.container{
    background:#1e293b;
    padding:40px;
    width:360px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 20px 50px rgba(0,0,0,0.5);
}

h1{
    margin-bottom:15px;
    font-size:28px;
}

h1 span{
    background:linear-gradient(90deg,#38bdf8,#a78bfa);
    -webkit-background-clip:text;
    color:transparent;
}

label{
    display:block;
    margin-bottom:10px;
    color:#cbd5f5;
    font-size:14px;
}

input{
    width:100%;
    padding:12px;
    border-radius:10px;
    border:none;
    background:#0f172a;
    color:white;
    margin-bottom:20px;
}

input[type="date"]::-webkit-calendar-picker-indicator {
    filter: invert(1);
    cursor: pointer;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    font-size:16px;
    color:white;
    cursor:pointer;
    background:linear-gradient(90deg,#3b82f6,#06b6d4);
    transition:0.3s;
}

button:hover{
    transform:scale(1.03);
}

.result{
    display:flex;
    justify-content:space-between;
    margin-top:30px;
}

.box{
    background:#0f172a;
    padding:20px;
    border-radius:15px;
    width:90px;
    box-shadow: inset 0 0 10px rgba(255,255,255,0.05);
}

.number{
    font-size:26px;
    font-weight:bold;
    color:#22d3ee;
}

.box p{
    font-size:12px;
    margin-top:5px;
    color:#94a3b8;
}

</style>
</head>

<body>

    <div class="container">

        <h1>Age <span>Calculator</span></h1>

        <label>Select your Birth Date</label>

        <input type="date" id="dob">

        <button onclick="calculateAge()">Calculate Now</button>

        <div class="result">

        <div class="box">
            <div id="years" class="number">0</div>
            <p>YEARS</p>
        </div>

        <div class="box">
            <div id="months" class="number">0</div>
            <p>MONTHS</p>
        </div>

        <div class="box">
            <div id="days" class="number">0</div>
            <p>DAYS</p>
        </div>

        </div>

    </div>

<script src="script.js"></script>
</body>
</html>
